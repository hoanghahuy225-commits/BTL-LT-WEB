name: CI Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up jdk 21
      uses: actions/setup-java@v4
      with: 
        distribution: temurin
        java-version: 21
        cache: maven 
    - name: run test
      run: mvn test