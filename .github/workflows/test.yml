name: CI Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up jdk 21
      uses: actions/setup-java@v4
      with: 
        distribution: temurin
        java-version: 21
        cache: maven 
    - name: run test
      run: mvn test
    - name: Show test error details
      if: failure()
      run: |
        echo "=== Test error details ==="
        cat target/surefire-reports/*.txt || echo "No .txt files found"
        cat target/surefire-reports/*.xml || echo "No .xml files found"