spring.application.name=WebBanHang
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/sports_shop
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tăng giới hạn upload file (mặc định là 1MB/10MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
# Cho phép số lượng file/tham số cực lớn (mặc định Tomcat chỉ cho 10-50 tùy bản)
server.tomcat.max-parameter-count=5000
server.tomcat.max-http-form-post-size=100MB
# Đảm bảo Multipart được bật
spring.servlet.multipart.enabled=true
# Tăng giới hạn số lượng part trong multipart request (Tomcat mặc định chỉ cho 20)
# Mỗi field trong form multipart đều tính là 1 part (không chỉ file)
server.tomcat.max-part-count=200
server.tomcat.max-swallow-size=-1


