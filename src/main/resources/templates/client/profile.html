<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - SportZone</title>
    <link rel="stylesheet" href="/css/client/base.css">
    <link rel="stylesheet" href="/css/client/header.css">
    <link rel="stylesheet" href="/css/client/footer.css">
    <link rel="stylesheet" href="/css/client/toast.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 40px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .profile-header {
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 24px;
            margin-bottom: 32px;
            text-align: center;
        }
        .profile-header h2 {
            font-size: 2.2rem;
            color: var(--gray-900, #1a1a1a);
            margin: 0;
            font-weight: 700;
        }
        .profile-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-group label {
            font-weight: 600;
            color: var(--gray-800, #333);
            font-size: 0.95rem;
        }
        .form-group input, .form-group select {
            padding: 14px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #fafafa;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-blue, #0056b3);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1);
            outline: none;
        }
        .form-group input[readonly] {
            background-color: #f1f3f5;
            color: #6c757d;
            cursor: not-allowed;
            border-color: #e9ecef;
        }
        .profile-actions {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 24px;
        }
        .btn-save {
            background: linear-gradient(135deg, #0056b3, #004494);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.3);
        }
        .btn-password {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 86, 179, 0.4);
        }
        .btn-password:hover {
            background: #f8f9fa;
            border-color: #ccc;
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-header {
            margin-bottom: 24px;
            border-bottom: 1px solid #eee;
            padding-bottom: 16px;
            text-align: left;
        }
        .modal-header h3 {
            margin: 0;
            font-size: 1.5rem;
            color: #1a1a1a;
        }
        .modal-body .form-group {
            margin-bottom: 20px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
        }
        .btn-cancel {
            padding: 12px 24px;
            border: none;
            background: #f1f3f5;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-confirm {
            padding: 12px 24px;
            border: none;
            background: #0056b3;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .profile-form {
                grid-template-columns: 1fr;
            }
            .profile-container {
                margin: 100px 15px 40px;
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div th:replace="~{client/fragments/header :: header_fragment}"></div>

    <!-- Main Content -->
    <div class="container main-content">
        <div class="profile-container">
            <div class="profile-header">
                <h2>Hồ sơ của bạn</h2>
                <p style="color: #666; margin-top: 8px;">Quản lý thông tin cá nhân để bảo mật tài khoản</p>
            </div>
            
            <form id="profileForm" class="profile-form">
                <div class="form-group full-width">
                    <label for="fullName">Họ và tên</label>
                    <input type="text" id="fullName" name="fullName" th:value="${user.fullName}" required placeholder="Vui lòng nhập họ và tên">
                </div>
                
                <div class="form-group">
                    <label for="email">Địa chỉ Email</label>
                    <input type="email" id="email" th:value="${user.email}" readonly title="Email không thể thay đổi">
                </div>
                
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" name="phone" th:value="${user.phone}" placeholder="Nhập số điện thoại">
                </div>
                
                <div class="form-group">
                    <label for="dateOfBirth">Ngày sinh</label>
                    <input type="date" id="dateOfBirth" name="dateOfBirth" th:value="${user.dateOfBirth != null ? user.dateOfBirth : ''}">
                </div>
                
                <div class="form-group">
                    <label for="gender">Giới tính</label>
                    <select id="gender" name="gender">
                        <option value="">Chọn giới tính</option>
                        <option value="Nam" th:selected="${user.gender == 'Nam'}">Nam</option>
                        <option value="Nữ" th:selected="${user.gender == 'Nữ'}">Nữ</option>
                        <option value="Khác" th:selected="${user.gender == 'Khác'}">Khác</option>
                    </select>
                </div>
                
                <div class="profile-actions">
                    <button type="submit" class="btn-save">Lưu thay đổi</button>
                    <button type="button" class="btn-password" onclick="togglePasswordModal(true)">Đổi mật khẩu</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Đổi mật khẩu</h3>
            </div>
            <form id="passwordForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label>Mật khẩu hiện tại</label>
                        <input type="password" id="oldPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <input type="password" id="newPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Xác nhận mật khẩu mới</label>
                        <input type="password" id="confirmPassword" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="togglePasswordModal(false)">Hủy</button>
                    <button type="submit" class="btn-confirm">Xác nhận</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{client/fragments/footer :: footer_fragment}"></div>

    <script src="/js/toast.js"></script>
    <script>
        function togglePasswordModal(show) {
            const modal = document.getElementById('passwordModal');
            if (show) modal.classList.add('active');
            else modal.classList.remove('active');
        }

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang lưu...';
            
            const formData = {
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                dateOfBirth: document.getElementById('dateOfBirth').value || null,
                gender: document.getElementById('gender').value
            };
            
            try {
                const response = await fetch('/profile/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await response.json();
                if (data.status === 'SUCCESS') showToast('Cập nhật thành công', 'success');
                else showToast(data.message || 'Cập nhật thất bại', 'error');
            } catch (error) {
                showToast('Lỗi kết nối', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Lưu thay đổi';
            }
        });

        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showToast('Mật khẩu xác nhận không khớp', 'error');
                return;
            }

            try {
                const response = await fetch('/profile/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                const data = await response.json();
                if (data.status === 'SUCCESS') {
                    showToast('Đổi mật khẩu thành công', 'success');
                    togglePasswordModal(false);
                    document.getElementById('passwordForm').reset();
                } else {
                    showToast(data.message || 'Thất bại', 'error');
                }
            } catch (error) {
                showToast('Lỗi kết nối', 'error');
            }
        });
    </script>
</body>
</html>
