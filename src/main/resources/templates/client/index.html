
  <!doctype html>
  <html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>SportZone - Premium Sports Equipment</title>
      <link rel="stylesheet" href="/css/client/base.css">
      <link rel="stylesheet" href="/css/client/header.css">
      <link rel="stylesheet" href="/css/client/footer.css">
      <link rel="stylesheet" href="/css/client/toast.css">
      <link rel="stylesheet" href="/css/client/index.css">
      <link rel="stylesheet" href="/css/client/chat-widget.css">
      
      <style>
    /* Override sticky → fixed, chỉ trang index */
    body.page-index header {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      transform: translateY(-100%);
      opacity: 0;
      transition: transform 0.4s ease, opacity 0.4s ease;
      background: rgba(255, 255, 255, 0.85) !important;
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    body.page-index header.scrolled,
    body.page-index header.hover-active {
      transform: translateY(0);
      opacity: 1;
    }

    body.page-index .hero {
      margin-top: 0;
    }
  </style>
    </head>
    
    <body>
      <!-- Header -->
      <div th:replace="~{client/fragments/header :: header_fragment}"></div>

      <!-- Hero Section -->
      <section class="hero">
        <!-- Background Video -->
        <video id="heroVideo" class="hero-video-bg" autoplay loop muted playsinline>
          <source th:src="@{/video/Sports_Commercial_Keyframes_In_a_cinematic_style_text_appears_on_screen_wbmL2-cQ.mp4}" type="video/mp4">
          Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>
        <div class="hero-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1;"></div>
        <div class="container" style="position: relative; z-index: 2;">
          <div class="hero-content">
            
  
          </div>
        </div>
      </section>

      <section class="products" id="products" style="padding-top: 4rem;">
        <div class="container">
          <div class="products-header">
            <h2>Tất cả sản phẩm</h2>
          </div>
          
          <div class="products-grid">
            <div class="product-card" th:each="product : ${products}">
              <div class="product-image-wrapper">
                <img th:src="${product.thumbnailUrl}" th:alt="${product.name}" class="product-image">
                <span class="product-badge" th:if="${product.salePrice != null}" th:text="${'-' + product.discountPercentage + '%'}"></span>
                <button class="product-wishlist"
                        th:classappend="${product.isWished} ? 'active' : ''"
                        th:onclick="'event.stopPropagation(); addToWishlist(' + ${product.id} + ' , this )'">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                  </svg>
                </button>
              </div>
              <div th:onclick="|window.location.href='@{/product/{id}(id=${product.id})}'|" style="cursor: pointer;" class="product-info">
                <p class="product-category" th:text="${product.gender != null ? product.gender : 'Unisex'}">Danh mục</p>
                <h3 class="product-name" th:text="${product.name}">Tên sản phẩm</h3>
                
                <div class="product-rating-sold" style="display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 0.85rem; color: #666;">
                  <span class="rating" style="display: flex; align-items: center; gap: 4px;">
                    <span th:text="${product.average_rating != null ? product.average_rating : 0}">0</span>
                    <svg style="width: 14px; height: 14px; fill: #fadb14; stroke: #fadb14;" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                  </span>
                  <span style="width: 1px; height: 12px; background-color: #ddd;"></span>
                  <span class="sold-quantity" th:text="'Đã bán ' + ${product.sold_quantity != null ? product.sold_quantity : 0}">Đã bán 0</span>
                </div>

                <div class="product-footer">
                  <span class="product-price" th:text="${product.salePrice != null ? #numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT') + 'đ' : #numbers.formatDecimal(product.basePrice, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</span>
                  <span class="original-price" th:if="${product.salePrice != null}" th:text="${#numbers.formatDecimal(product.basePrice, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</span>
                </div>
              </div>
            </div>
          </div>

          <div th:if="${totalPages > 1}" class="pagination-container" style="margin-top: 3rem; display: flex; justify-content: center; gap: 0.5rem; padding-bottom: 4rem;">
            <a th:if="${currentPage > 0}" th:href="@{/(page=${currentPage - 1})}" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Trang trước</a>
            <span th:if="${currentPage == 0}" class="btn btn-secondary" style="padding: 0.5rem 1rem; opacity: 0.5; cursor: not-allowed;">Trang trước</span>
            <span style="display: flex; align-items: center; padding: 0 1rem; font-weight: bold; color: var(--gray-700);">
              Trang <span th:text="${currentPage + 1}" style="margin: 0 0.25rem; color: var(--primary-blue);">1</span> / <span th:text="${totalPages}" style="margin: 0 0.25rem;">1</span>
            </span>
            <a th:if="${currentPage < totalPages - 1}" th:href="@{/(page=${currentPage + 1})}" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Trang tiếp</a>
            <span th:if="${currentPage >= totalPages - 1}" class="btn btn-secondary" style="padding: 0.5rem 1rem; opacity: 0.5; cursor: not-allowed;">Trang tiếp</span>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <div th:replace="~{client/fragments/footer :: footer_fragment}"></div>

      <!-- Chat Widget -->
      <div th:replace="~{client/fragments/chat-widget :: chat_widget}"></div>

      <script>
        document.body.classList.add('page-index');
        const header = document.querySelector('header');
        
        // Hiện header khi cuộn chuột
        window.addEventListener('scroll', () => {
          if (window.scrollY > 80) {
            header?.classList.add('scrolled');
          } else {
            header?.classList.remove('scrolled');
          }
        }, { passive: true });

  
        window.addEventListener('mousemove', (e) => {
          if (e.clientY < 20) {
            header?.classList.add('hover-active');
          }
        });

        // Ẩn header khi di chuột ra khỏi header (chỉ khi chưa cuộn xuống quá 80px)
        header?.addEventListener('mouseleave', () => {
          header?.classList.remove('hover-active');
        });

        async function addToWishlist(productId , btnElement) {
          const isWished = btnElement.classList.toggle('active');
          let userId = null;
          try {
              userId = JSON.parse(sessionStorage.getItem('currentUser')).id;
          } catch (e) {
              showToast('Vui lòng đăng nhập để thao tác với wishlist', 'error');
              setTimeout(() => window.location.href = '/login', 1500);
              return;
          }
          const endpoint = isWished ? '/wishlist/add' : '/wishlist/remove';
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, productId })
          });
          const data = await res.json();
          showToast(data.status === 'SUCCESS' ? (isWished ? 'Đã thêm vào wishlist' : 'Đã xóa khỏi wishlist') : (data.message || 'Lỗi'), data.status === 'SUCCESS' ? 'success' : 'error');
        } 
      
        const video = document.getElementById('heroVideo');
        if (video) {
          video.addEventListener('ended', function() { this.play(); }, false);
          video.play().catch(error => { console.log("Autoplay blocked"); });
        }
      </script>
    </body>
  </html>
