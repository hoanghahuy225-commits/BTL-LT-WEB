<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="confirm_modal">

  <!-- Overlay + hộp modal -->
  <div id="confirm-overlay" style="
      display:none; position:fixed; inset:0; z-index:99999;
      background:rgba(0,0,0,0.45); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
  ">
    <div id="confirm-box" style="
        background:#fff; border-radius:20px; padding:36px 32px;
        width:90%; max-width:420px; box-shadow:0 24px 60px rgba(0,0,0,0.2);
        transform:scale(0.88); opacity:0;
        transition:transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s ease;
        font-family:'Inter',sans-serif;
    ">
      <!-- Vòng tròn icon -->
      <div id="confirm-icon-wrap" style="
          width:60px; height:60px; border-radius:50%;
          display:flex; align-items:center; justify-content:center;
          margin:0 auto 20px;
      "></div>

      <!-- Tiêu đề -->
      <h3 id="confirm-title" style="
          font-size:1.15rem; font-weight:700; color:#1a1a2e;
          text-align:center; margin-bottom:10px;
          font-family:'Inter',sans-serif;
      "></h3>

      <!-- Nội dung -->
      <p id="confirm-message" style="
          font-size:.875rem; color:#6b7280; text-align:center;
          line-height:1.65; margin-bottom:28px;
          font-family:'Inter',sans-serif;
      "></p>

      <!-- Nút -->
      <div style="display:flex; gap:12px;">
        <button id="confirm-back-btn" style="
            flex:1; padding:12px 0; border-radius:10px;
            border:1.5px solid #e5e7eb; background:#fff;
            font-size:.9rem; font-weight:600; color:#374151;
            cursor:pointer; transition:border-color .2s, color .2s;
            font-family:'Inter',sans-serif;
            display:flex; align-items:center; justify-content:center; gap:6px;
        ">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Quay lại
        </button>
        <button id="confirm-ok-btn" style="
            flex:1; padding:12px 0; border-radius:10px;
            border:none; font-size:.9rem; font-weight:600; color:#fff;
            cursor:pointer; transition:opacity .2s, transform .1s;
            font-family:'Inter',sans-serif;
            display:flex; align-items:center; justify-content:center; gap:6px;
        ">
          Xác nhận
        </button>
      </div>
    </div>
  </div>

  <!-- Script: hàm showConfirm() -->
  <script>
    /**
     * showConfirm — Modal xác nhận dùng chung toàn dự án
     *
     * @param {Object} options
     * @param {string}   options.title        - Tiêu đề (bắt buộc)
     * @param {string}  [options.message]     - Nội dung mô tả
     * @param {string}  [options.type]        - 'danger' | 'warning' | 'info' | 'success'  (mặc định: 'danger')
     * @param {string}  [options.confirmText] - Text nút xác nhận (mặc định: 'Xác nhận')
     * @param {string}  [options.backText]    - Text nút quay lại (mặc định: 'Quay lại')
     * @param {*}       [options.data]        - Dữ liệu tùy ý truyền vào callback
     * @param {Function}[options.onConfirm]   - Callback khi bấm Xác nhận: (data) => {}
     * @param {Function}[options.onBack]      - Callback khi bấm Quay lại: (data) => {}
     */
    function showConfirm({
      title,
      message     = '',
      type        = 'danger',
      confirmText = 'Xác nhận',
      backText    = 'Quay lại',
      data        = {},
      onConfirm,
      onBack
    } = {}) {

      const overlay  = document.getElementById('confirm-overlay');
      const box      = document.getElementById('confirm-box');
      const iconWrap = document.getElementById('confirm-icon-wrap');
      const titleEl  = document.getElementById('confirm-title');
      const msgEl    = document.getElementById('confirm-message');
      const okBtn    = document.getElementById('confirm-ok-btn');
      const backBtn  = document.getElementById('confirm-back-btn');

      /* ── Bảng theme SVG (stroke/outline – đồng nhất với dự án) ── */
      const themes = {
        danger: {
          bg: '#fef2f2', btnColor: '#ef4444',
          svg: `<svg viewBox="0 0 24 24" width="28" height="28" fill="none"
                     stroke="#ef4444" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>`
        },
        warning: {
          bg: '#fffbeb', btnColor: '#f59e0b',
          svg: `<svg viewBox="0 0 24 24" width="28" height="28" fill="none"
                     stroke="#f59e0b" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                  <line x1="12" y1="9" x2="12" y2="13"/>
                  <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>`
        },
        info: {
          bg: '#eff6ff', btnColor: '#3b5bff',
          svg: `<svg viewBox="0 0 24 24" width="28" height="28" fill="none"
                     stroke="#3b5bff" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8"  x2="12"    y2="12"/>
                  <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>`
        },
        success: {
          bg: '#f0fdf4', btnColor: '#22c55e',
          svg: `<svg viewBox="0 0 24 24" width="28" height="28" fill="none"
                     stroke="#22c55e" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                  <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>`
        },
      };

      const theme = themes[type] || themes.danger;

      /* ── Đổ dữ liệu vào modal ── */
      iconWrap.style.background = theme.bg;
      iconWrap.innerHTML        = theme.svg;
      okBtn.style.background    = theme.btnColor;

      titleEl.textContent = title   || '';
      msgEl.textContent   = message || '';

      // Cập nhật text nút (giữ lại icon arrow ở nút Back)
      okBtn.textContent   = confirmText;
      backBtn.innerHTML   = `
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        ${backText}`;

      /* ── Hiện modal với animation ── */
      overlay.style.display = 'flex';
      requestAnimationFrame(() => {
        box.style.transform = 'scale(1)';
        box.style.opacity   = '1';
      });

      /* ── Đóng modal ── */
      function closeModal() {
        box.style.transform = 'scale(0.88)';
        box.style.opacity   = '0';
        setTimeout(() => { overlay.style.display = 'none'; }, 220);
        okBtn.removeEventListener('click', handleOk);
        backBtn.removeEventListener('click', handleBack);
        overlay.removeEventListener('click', handleOverlayClick);
      }

      function handleOk()             { closeModal(); if (typeof onConfirm === 'function') onConfirm(data); }
      function handleBack()           { closeModal(); if (typeof onBack    === 'function') onBack(data); }
      function handleOverlayClick(e)  { if (e.target === overlay) handleBack(); }

      okBtn.addEventListener('click',   handleOk);
      backBtn.addEventListener('click', handleBack);
      overlay.addEventListener('click', handleOverlayClick);
    }
  </script>

</div>
</body>
</html>
