<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
  <div style="margin-bottom: 24px;">
    <h2 style="font-size: 20px;">Kết quả tìm kiếm cho: <span style="color: var(--primary);" th:text="'&quot;' + ${query} + '&quot;'">"..."</span></h2>
  </div>

  <div th:if="${#lists.isEmpty(foundProducts) && #lists.isEmpty(foundOrders) && #lists.isEmpty(foundBrands) && #lists.isEmpty(foundCategories)}"
       class="section-card" style="padding: 40px; text-align: center;">
    <i class="fas fa-search-minus" style="font-size: 48px; color: var(--text2); margin-bottom: 16px;"></i>
    <p style="color: var(--text2);">Không tìm thấy kết quả nào phù hợp.</p>
  </div>

  <!-- PRODUCTS -->
  <div th:if="${not #lists.isEmpty(foundProducts)}" class="section-card" style="margin-bottom: 24px;">
    <div class="section-header">
      <h3>Sản phẩm (<span th:text="${#lists.size(foundProducts)}">0</span>)</h3>
    </div>
    <table>
      <thead><tr><th>Ảnh</th><th>Tên sản phẩm</th><th>Giá</th><th>Thao tác</th></tr></thead>
      <tbody>
        <tr th:each="p : ${foundProducts}" style="cursor:pointer" th:onclick="'window.location.href=\'/admin/products/' + ${p.id} + '\''">
          <td><img th:src="${p.thumbnailUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:4px"></td>
          <td th:text="${p.name}">-</td>
          <td th:text="${#numbers.formatInteger(p.salePrice ?: p.basePrice, 0, 'POINT') + 'đ'}">-</td>
          <td onclick="event.stopPropagation()"><a th:href="@{/admin/products/{id}(id=${p.id})}" class="btn btn-outline btn-sm" title="Xem chi tiết"><i class="fas fa-eye"></i></a></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ORDERS -->
  <div th:if="${not #lists.isEmpty(foundOrders)}" class="section-card" style="margin-bottom: 24px;">
    <div class="section-header">
      <h3>Đơn hàng (<span th:text="${#lists.size(foundOrders)}">0</span>)</h3>
    </div>
    <table>
      <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
      <tbody>
        <tr th:each="o : ${foundOrders}">
          <td><strong th:text="${o.orderCode}">-</strong></td>
          <td th:text="${o.shippingRecipientName}">-</td>
          <td><span class="badge-status" th:classappend="'badge-' + ${o.orderStatus.toLowerCase()}" th:text="${o.orderStatus}">-</span></td>
          <td><a th:href="@{/admin/orders/{id}(id=${o.orderId})}" class="btn btn-outline btn-sm"><i class="fas fa-eye"></i></a></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="grid-2">
    <!-- BRANDS -->
    <div th:if="${not #lists.isEmpty(foundBrands)}" class="section-card">
      <div class="section-header"><h3>Thương hiệu (<span th:text="${#lists.size(foundBrands)}">0</span>)</h3></div>
      <table>
        <tbody>
          <tr th:each="b : ${foundBrands}">
            <td th:text="${b.name}">-</td>
            <td style="text-align:right"><a th:href="@{/admin/brands}" class="btn btn-outline btn-sm"><i class="fas fa-arrow-right"></i></a></td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- CATEGORIES -->
    <div th:if="${not #lists.isEmpty(foundCategories)}" class="section-card">
      <div class="section-header"><h3>Danh mục (<span th:text="${#lists.size(foundCategories)}">0</span>)</h3></div>
      <table>
        <tbody>
          <tr th:each="c : ${foundCategories}">
            <td th:text="${c.name}">-</td>
            <td style="text-align:right"><a th:href="@{/admin/categories}" class="btn btn-outline btn-sm"><i class="fas fa-arrow-right"></i></a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</html>
