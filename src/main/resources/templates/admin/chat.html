<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

<style>
/* ══════════════════════════════════════════════════════
   ADMIN CHAT – Two-column layout
   ══════════════════════════════════════════════════════ */
.chat-container {
  display: grid;
  grid-template-columns: 340px 1fr;
  /* fit within .content padding (28px top + 28px bottom = 56px) + topbar (64px) */
  height: calc(100vh - 64px - 56px);
  background: #f8f9fb;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  border: 1px solid #e5e7eb;
}

/* ── Left: Conversation List ── */
.chat-list-panel {
  background: #fff;
  border-right: 1px solid #e5e7eb;
  display: flex;
  flex-direction: column;
  min-height: 0; /* critical for flex overflow */
}
.chat-list-header {
  padding: 20px;
  border-bottom: 1px solid #f3f4f6;
  flex-shrink: 0;
}
.chat-list-header h3 {
  margin: 0;
  font-size: 1.1rem;
  font-weight: 700;
  color: #1f2937;
}
.chat-list-count {
  font-size: 0.8rem;
  color: #6b7280;
  margin-top: 4px;
}
.chat-list-items {
  flex: 1;
  overflow-y: auto;
  min-height: 0; /* critical for flex overflow */
}
.chat-list-items::-webkit-scrollbar { width: 5px; }
.chat-list-items::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

.chat-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid #f9fafb;
}
.chat-list-item:hover { background: #f9fafb; }
.chat-list-item.active { background: #eef2ff; border-left: 3px solid #667eea; }

.chat-list-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1rem;
  flex-shrink: 0;
}
.chat-list-info {
  flex: 1;
  min-width: 0;
}
.chat-list-name {
  font-weight: 600;
  font-size: 0.92rem;
  color: #1f2937;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-list-preview {
  font-size: 0.82rem;
  color: #6b7280;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-list-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}
.chat-list-time {
  font-size: 0.72rem;
  color: #9ca3af;
  white-space: nowrap;
}
.chat-list-badge {
  background: #ef4444;
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  min-width: 20px;
  height: 20px;
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
}

/* ── Empty state ── */
.chat-list-empty {
  padding: 40px 20px;
  text-align: center;
  color: #9ca3af;
  font-size: 0.9rem;
}
.chat-list-empty svg {
  width: 48px;
  height: 48px;
  margin-bottom: 12px;
  stroke: #d1d5db;
}

/* ── Right: Chat Area ── */
.chat-area-panel {
  display: flex;
  flex-direction: column;
  background: #f8f9fb;
  min-height: 0; /* critical for flex overflow */
}

/* Chat area header */
.chat-area-header {
  padding: 16px 24px;
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.chat-area-header-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.9rem;
}
.chat-area-header-info h4 {
  margin: 0;
  font-size: 1rem;
  font-weight: 600;
  color: #1f2937;
}
.chat-area-header-info p {
  margin: 2px 0 0;
  font-size: 0.78rem;
  color: #6b7280;
}

/* Messages area */
.chat-area-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0; /* critical for flex overflow */
}
.chat-area-messages::-webkit-scrollbar { width: 5px; }
.chat-area-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

/* Admin message bubbles */
.admin-msg {
  max-width: 65%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 0.9rem;
  line-height: 1.5;
  word-wrap: break-word;
  animation: adminMsgIn 0.2s ease;
}
@keyframes adminMsgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.admin-msg.from-client {
  align-self: flex-start;
  background: #fff;
  color: #1f2937;
  border: 1px solid #e5e7eb;
  border-bottom-left-radius: 4px;
}
.admin-msg.from-admin {
  align-self: flex-end;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.admin-msg-sender {
  font-size: 0.72rem;
  font-weight: 600;
  margin-bottom: 2px;
  opacity: 0.8;
}
.admin-msg-meta {
  font-size: 0.7rem;
  margin-top: 4px;
  opacity: 0.6;
}
.admin-msg.from-admin .admin-msg-meta { text-align: right; }
.admin-msg.from-client .admin-msg-meta { text-align: left; }

/* Input area */
.chat-area-input {
  padding: 14px 24px;
  background: #fff;
  border-top: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.chat-area-input input {
  flex: 1;
  border: 1.5px solid #e5e7eb;
  border-radius: 24px;
  padding: 10px 18px;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
}
.chat-area-input input:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
}
.chat-area-send {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s;
}
.chat-area-send:hover { transform: scale(1.06); }
.chat-area-send svg { width: 18px; height: 18px; }

/* Placeholder when no conversation selected */
.chat-area-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #9ca3af;
  gap: 12px;
}
.chat-area-placeholder svg {
  width: 64px;
  height: 64px;
  stroke: #d1d5db;
}
.chat-area-placeholder p {
  font-size: 1rem;
  color: #6b7280;
}

/* Responsive */
@media (max-width: 768px) {
  .chat-container {
    grid-template-columns: 1fr;
    height: calc(100vh - 80px);
  }
  .chat-list-panel { max-height: 240px; }
}
</style>

<div class="chat-container">
  <!-- Left: Conversation List -->
  <div class="chat-list-panel">
    <div class="chat-list-header">
      <h3>💬 Tin nhắn</h3>
      <div class="chat-list-count" id="convCount">Đang tải...</div>
    </div>
    <div class="chat-list-items" id="convList">
      <div class="chat-list-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Chưa có cuộc hội thoại nào</p>
      </div>
    </div>
  </div>

  <!-- Right: Chat Area -->
  <div class="chat-area-panel" id="chatAreaPanel">
    <div class="chat-area-placeholder" id="chatPlaceholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Chọn một cuộc hội thoại để bắt đầu</p>
    </div>

    <!-- Chat header (hidden initially) -->
    <div class="chat-area-header" id="chatAreaHeader" style="display:none;">
      <div class="chat-area-header-avatar" id="chatAreaAvatar">U</div>
      <div class="chat-area-header-info">
        <h4 id="chatAreaName">Khách hàng</h4>
        <p id="chatAreaStatus">Đang hoạt động</p>
      </div>
    </div>

    <!-- Messages (hidden initially) -->
    <div class="chat-area-messages" id="chatAreaMessages" style="display:none;"></div>

    <!-- Input (hidden initially) -->
    <div class="chat-area-input" id="chatAreaInput" style="display:none;">
      <input type="text" id="adminChatInput" placeholder="Nhập tin nhắn trả lời..." autocomplete="off" />
      <button class="chat-area-send" id="adminSendBtn" title="Gửi">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- SockJS + StompJS CDN -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

<script>
(function() {
  'use strict';

  let stompClient = null;
  let isConnected = false;
  let activeConvId = null;
  let currentAdminId = null;

  // Try to get admin user ID from session
  try {
    const u = JSON.parse(sessionStorage.getItem('currentUser'));
    if (u) currentAdminId = u.id;
  } catch(e) {}

  // DOM refs
  const convList = document.getElementById('convList');
  const convCount = document.getElementById('convCount');
  const chatPlaceholder = document.getElementById('chatPlaceholder');
  const chatAreaHeader = document.getElementById('chatAreaHeader');
  const chatAreaMessages = document.getElementById('chatAreaMessages');
  const chatAreaInput = document.getElementById('chatAreaInput');
  const adminInput = document.getElementById('adminChatInput');
  const adminSendBtn = document.getElementById('adminSendBtn');
  const chatAreaAvatar = document.getElementById('chatAreaAvatar');
  const chatAreaName = document.getElementById('chatAreaName');

  // Store loaded conversations for click handlers
  let conversationsCache = [];

  // ─── Init ─────────────────────────────────────────
  loadConversations();
  connectWebSocket();

  // ─── Load all conversations ───────────────────────
  async function loadConversations() {
    try {
      const res = await fetch('/api/chat/conversations');
      if (!res.ok) {
        console.error('Failed to load conversations:', res.status);
        return;
      }
      const conversations = await res.json();
      conversationsCache = conversations;

      if (conversations.length === 0) {
        convList.innerHTML = `
          <div class="chat-list-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <p>Chưa có cuộc hội thoại nào</p>
          </div>`;
        convCount.textContent = '0 cuộc hội thoại';
        return;
      }

      convCount.textContent = conversations.length + ' cuộc hội thoại';
      convList.innerHTML = '';

      conversations.forEach(conv => {
        const item = createConvItem(conv);
        convList.appendChild(item);
      });
    } catch(err) {
      console.error('Load conversations error:', err);
    }
  }

  function createConvItem(conv) {
    const div = document.createElement('div');
    div.className = 'chat-list-item';
    div.id = 'conv-item-' + conv.id;
    div.dataset.convId = conv.id;
    if (activeConvId === conv.id) div.classList.add('active');

    const initials = (conv.clientName || 'U').charAt(0).toUpperCase();
    const timeStr = conv.lastMessageAt ? formatTimeShort(conv.lastMessageAt) : '';
    const preview = conv.lastMessageContent || 'Chưa có tin nhắn';
    const badgeHtml = conv.unreadCount > 0
      ? `<span class="chat-list-badge">${conv.unreadCount}</span>` : '';

    div.innerHTML = `
      <div class="chat-list-avatar">${initials}</div>
      <div class="chat-list-info">
        <div class="chat-list-name">${escapeHtml(conv.clientName || 'Khách hàng')}</div>
        <div class="chat-list-preview">${escapeHtml(preview)}</div>
      </div>
      <div class="chat-list-meta">
        <span class="chat-list-time">${timeStr}</span>
        <div class="badge-container">${badgeHtml}</div>
      </div>`;

    // Use conv.id to look up from cache when clicked
    const convId = conv.id;
    div.addEventListener('click', () => {
      // Find latest version of conv from cache
      const latestConv = conversationsCache.find(c => c.id === convId) || conv;
      selectConversation(latestConv);
    });
    return div;
  }

  // ─── Select a conversation ────────────────────────
  async function selectConversation(conv) {
    // Don't re-select if already viewing this conversation
    if (activeConvId === conv.id && chatAreaMessages.style.display === 'flex') return;
    activeConvId = conv.id;

    // Highlight active item
    document.querySelectorAll('.chat-list-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.convId) === conv.id);
    });

    // Show chat area components, hide placeholder
    chatPlaceholder.style.display = 'none';
    chatAreaHeader.style.display = 'flex';
    chatAreaMessages.style.display = 'flex';
    chatAreaInput.style.display = 'flex';

    // Set header info
    const initials = (conv.clientName || 'U').charAt(0).toUpperCase();
    chatAreaAvatar.textContent = initials;
    chatAreaName.textContent = conv.clientName || 'Khách hàng';

    // Load messages
    chatAreaMessages.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:20px;">Đang tải tin nhắn...</div>';
    try {
      const res = await fetch('/api/chat/history/' + conv.id);
      if (!res.ok) {
        chatAreaMessages.innerHTML = '<div style="text-align:center;color:#ef4444;padding:20px;">Không thể tải tin nhắn</div>';
        return;
      }
      const messages = await res.json();
      chatAreaMessages.innerHTML = '';

      if (messages.length === 0) {
        chatAreaMessages.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:20px;">Chưa có tin nhắn</div>';
      } else {
        messages.forEach(msg => appendAdminMessage(msg));
        scrollToBottom();
      }

      // Mark as read
      fetch('/api/chat/mark-read/' + conv.id, { method: 'POST' });

      // Remove badge in UI
      const item = document.getElementById('conv-item-' + conv.id);
      if (item) {
        const badgeCont = item.querySelector('.badge-container');
        if (badgeCont) badgeCont.innerHTML = '';
      }
    } catch(err) {
      console.error('Load messages error:', err);
      chatAreaMessages.innerHTML = '<div style="text-align:center;color:#ef4444;padding:20px;">Lỗi tải tin nhắn</div>';
    }

    if (adminInput) adminInput.focus();
  }

  // ─── Send admin reply ─────────────────────────────
  function sendAdminReply() {
    const text = adminInput.value.trim();
    if (!text || !isConnected || !activeConvId || !currentAdminId) return;

    try {
      stompClient.publish({
        destination: '/app/chat.admin.send',
        body: JSON.stringify({
          senderId: currentAdminId,
          conversationId: activeConvId,
          content: text
        })
      });

      adminInput.value = '';
      adminInput.focus();
    } catch (err) {
      console.error('Send error:', err);
    }
  }

  adminSendBtn.addEventListener('click', sendAdminReply);
  adminInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendAdminReply();
    }
  });

  // ─── WebSocket ────────────────────────────────────
  function connectWebSocket() {
    const socket = new SockJS('/ws');
    stompClient = new StompJs.Client({
      webSocketFactory: () => socket,
      reconnectDelay: 5000,
      onConnect: () => {
        isConnected = true;

        // Subscribe to admin notification channel
        stompClient.subscribe('/topic/admin/new-message', (message) => {
          const msg = JSON.parse(message.body);
          handleNewMessage(msg);
        });
      },
      onDisconnect: () => { isConnected = false; },
      onStompError: (frame) => { console.error('STOMP error:', frame); }
    });

    stompClient.activate();
  }

  function handleNewMessage(msg) {
    // 1. If it's for the currently active conversation, append it
    if (msg.conversationId === activeConvId) {
      // Avoid duplicate append
      if (!document.getElementById('admin-msg-' + msg.id)) {
        appendAdminMessage(msg);
        scrollToBottom();
        // Mark as read since admin is viewing
        fetch('/api/chat/mark-read/' + activeConvId, { method: 'POST' });
      }
    }

    // 2. Update the conversation list item (surgically, without reloading)
    updateConvListItem(msg);
  }

  function updateConvListItem(msg) {
    let item = document.getElementById('conv-item-' + msg.conversationId);
    
    if (!item) {
      // New conversation that wasn't in list, reload entire list
      loadConversations();
      return;
    }

    // Update preview and time
    const previewEl = item.querySelector('.chat-list-preview');
    const timeEl    = item.querySelector('.chat-list-time');
    if (previewEl) previewEl.textContent = msg.content;
    if (timeEl)    timeEl.textContent    = formatTimeShort(new Date());

    // Update unread badge if not active conversation and from client
    if (msg.conversationId !== activeConvId && msg.senderRole === 'CLIENT') {
      const badgeCont = item.querySelector('.badge-container');
      if (badgeCont) {
        let badge = badgeCont.querySelector('.chat-list-badge');
        if (badge) {
          let count = parseInt(badge.textContent) || 0;
          badge.textContent = count + 1;
        } else {
          badgeCont.innerHTML = `<span class="chat-list-badge">1</span>`;
        }
      }
    }

    // Move to top of list
    convList.prepend(item);
  }

  // ─── Append message to admin chat area ────────────
  function appendAdminMessage(msg) {
    if (document.getElementById('admin-msg-' + msg.id)) return;

    // Remove any placeholder text (loading/empty messages)
    const placeholder = chatAreaMessages.querySelector('[style*="text-align:center"]');
    if (placeholder) placeholder.remove();

    const isFromClient = msg.senderRole === 'CLIENT';
    const div = document.createElement('div');
    div.id = 'admin-msg-' + msg.id;
    div.className = 'admin-msg ' + (isFromClient ? 'from-client' : 'from-admin');

    let senderLabel = '';
    if (isFromClient) {
      senderLabel = `<div class="admin-msg-sender">${escapeHtml(msg.senderName)}</div>`;
    } else {
      senderLabel = `<div class="admin-msg-sender">${escapeHtml(msg.senderName)}</div>`;
    }

    div.innerHTML = `
      ${senderLabel}
      <div>${escapeHtml(msg.content)}</div>
      <div class="admin-msg-meta">${formatTime(msg.timestamp)}</div>`;

    chatAreaMessages.appendChild(div);
  }

  // ─── Utils ────────────────────────────────────────
  function scrollToBottom() {
    requestAnimationFrame(() => {
      chatAreaMessages.scrollTop = chatAreaMessages.scrollHeight;
    });
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function formatTimeShort(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Vừa xong';
    if (diff < 3600000) return Math.floor(diff/60000) + ' phút';
    if (diff < 86400000) return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>

</div>

</body>
</html>
