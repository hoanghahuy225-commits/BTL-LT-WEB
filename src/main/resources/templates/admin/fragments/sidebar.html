<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<aside th:fragment="sidebar(activePage)" class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">SZ</div>
    <span>SportZone</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group">
      <div class="nav-group-title">Tổng quan</div>
      <a th:href="@{/admin}" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'">
        <i class="fas fa-chart-pie"></i>Dashboard
      </a>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Quản lý bán hàng</div>
      <a th:href="@{/admin/orders}" class="nav-item" th:classappend="${activePage == 'orders'} ? 'active'">
        <i class="fas fa-shopping-bag"></i>Đơn hàng
        <span class="badge" th:if="${pendingOrderCount != null && pendingOrderCount > 0}" th:text="${pendingOrderCount}">0</span>
      </a>
      <a th:href="@{/admin/products}" class="nav-item" th:classappend="${activePage == 'products'} ? 'active'">
        <i class="fas fa-box"></i>Sản phẩm
      </a>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Danh mục &amp; Thuộc tính</div>
      <a th:href="@{/admin/categories}" class="nav-item" th:classappend="${activePage == 'categories'} ? 'active'">
        <i class="fas fa-layer-group"></i>Danh mục
      </a>
      <a th:href="@{/admin/brands}" class="nav-item" th:classappend="${activePage == 'brands'} ? 'active'">
        <i class="fas fa-tags"></i>Thương hiệu
      </a>
      <a th:href="@{/admin/sports}" class="nav-item" th:classappend="${activePage == 'sports'} ? 'active'">
        <i class="fas fa-futbol"></i>Môn thể thao
      </a>
      <a th:href="@{/admin/colors}" class="nav-item" th:classappend="${activePage == 'colors'} ? 'active'">
        <i class="fas fa-palette"></i>Màu sắc
      </a>
      <a th:href="@{/admin/sizes}" class="nav-item" th:classappend="${activePage == 'sizes'} ? 'active'">
        <i class="fas fa-ruler"></i>Kích thước
      </a>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Hệ thống</div>
      <a th:href="@{/admin/staff}" class="nav-item" th:classappend="${activePage == 'staff'} ? 'active'">
        <i class="fas fa-user-shield"></i>Nhân viên
      </a>
      <a th:href="@{/admin/chat}" class="nav-item" th:classappend="${activePage == 'chat'} ? 'active'">
        <i class="fas fa-comments"></i>Tin nhắn
        <span id="sidebar-chat-badge" class="badge" th:text="${unreadChatCount != null ? unreadChatCount : 0}" th:style="${unreadChatCount == null || unreadChatCount <= 0 ? 'display:none;' : ''}">0</span>
      </a>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Khác</div>
      <a th:href="@{/}" class="nav-item" style="color: #60a5fa;">
        <i class="fas fa-store"></i>Về trang bán hàng
      </a>
    </div>
  </nav>
  <div style="padding:16px 12px;border-top:1px solid rgba(255,255,255,.08)">
    <a th:href="@{/logout}" class="nav-item" style="color:rgba(255,255,255,.5)">
      <i class="fas fa-sign-out-alt"></i>Đăng xuất
    </a>
  </div>
</aside>
</html>
