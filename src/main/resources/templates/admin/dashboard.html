<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
  <!-- STATS -->
  <div class="stats">
    <div class="stat-card" style="cursor:pointer" onclick="window.location.href='/admin/staff'">
      <div class="icon-wrap" style="background:#eff6ff;color:#3b82f6"><i class="fas fa-users"></i></div>
      <div class="label">Tổng khách hàng</div>
      <div class="value" th:text="${clientCount}">0</div>
    </div>
    <div class="stat-card" style="cursor:pointer" onclick="window.location.href='/admin/orders'">
      <div class="icon-wrap" style="background:#f5f3ff;color:#8b5cf6"><i class="fas fa-shopping-bag"></i></div>
      <div class="label">Tổng số đơn hàng</div>
      <div class="value" th:text="${orderCount}">0</div>
    </div>
    <div class="stat-card">
      <div class="icon-wrap" style="background:#ecfdf5;color:#10b981"><i class="fas fa-money-bill-wave"></i></div>
      <div class="label">Doanh thu thực (Đã giao)</div>
      <div class="value" th:text="${#numbers.formatInteger(deliveredRevenue, 0, 'POINT') + 'đ'}">0đ</div>
    </div>
    <div class="stat-card" style="cursor:pointer" onclick="window.location.href='/admin/products'">
      <div class="icon-wrap" style="background:#fff7ed;color:#f59e0b"><i class="fas fa-boxes"></i></div>
      <div class="label">Tổng số sản phẩm</div>
      <div class="value" th:text="${productCount}">0</div>
    </div>
  </div>

  <div class="grid-2">
    <!-- Recent Orders -->
...

      <div class="section-header">
        <h3>Đơn hàng gần đây</h3>
        <a th:href="@{/admin/orders}" class="btn btn-outline btn-sm">Xem tất cả</a>
      </div>
      <table>
        <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Tổng tiền</th><th>Trạng thái</th></tr></thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(recentOrders)}">
            <td colspan="4" class="empty-state"><i class="fas fa-inbox"></i><p>Chưa có đơn hàng</p></td>
          </tr>
          <tr th:each="o : ${recentOrders}">
            <td><strong th:text="${o.orderCode}">-</strong></td>
            <td th:text="${o.shippingRecipientName}">-</td>
            <td th:text="${#numbers.formatInteger(o.finalAmount, 0, 'POINT') + 'đ'}">-</td>
            <td>
              <span class="badge-status"
                    th:classappend="${o.orderStatus == 'Pending'} ? 'badge-pending' : (${o.orderStatus == 'Confirmed'} ? 'badge-confirmed' : (${o.orderStatus == 'Shipping'} ? 'badge-shipping' : (${o.orderStatus == 'Delivered'} ? 'badge-delivered' : 'badge-cancelled')))"
                    th:text="${o.orderStatus == 'Pending'} ? 'Chờ xác nhận' : (${o.orderStatus == 'Confirmed'} ? 'Đã xác nhận' : (${o.orderStatus == 'Shipping'} ? 'Đang giao' : (${o.orderStatus == 'Delivered'} ? 'Đã giao' : 'Đã hủy')))">-</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Best Selling Products (Moved here) -->
    <div class="section-card">
      <div class="section-header">
        <h3>Sản phẩm bán chạy nhất</h3>
        <a th:href="@{/admin/products}" class="btn btn-outline btn-sm">Xem tất cả</a>
      </div>
      <table>
        <thead>
          <tr>
            <th>Sản phẩm</th>
            <th>Đã bán</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(bestSellingProducts)}">
            <td colspan="2" class="empty-state"><i class="fas fa-box-open"></i><p>Chưa có dữ liệu</p></td>
          </tr>
          <tr th:each="p : ${bestSellingProducts}" style="cursor:pointer" th:onclick="'window.location.href=\'/admin/products/' + ${p.id} + '\''">
            <td style="display:flex;align-items:center;gap:10px;">
              <img th:src="${p.thumbnailUrl != null ? p.thumbnailUrl : 'https://images.pexels.com/photos/2529148/pexels-photo-2529148.jpeg?auto=compress&cs=tinysrgb&w=150'}" alt="product" style="width:36px;height:36px;border-radius:4px;object-fit:cover;">
              <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px;">
                <strong th:text="${p.name}" style="display:block; font-size: 13px;">Tên sản phẩm</strong>
                <small th:text="${p.gender}" style="color:#64748b"></small>
              </div>
            </td>
            <td><span class="badge-status badge-delivered" th:text="${p.soldQuantity}">0</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</html>
